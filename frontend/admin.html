<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <h2>👨‍💼 Admin Dashboard</h2>
            <div>
                <span id="currentUser"></span>
                <button id="logoutBtn" class="btn btn-outline">Logout</button>
            </div>
        </nav>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Employees</h3>
                <span id="totalEmployees">0</span>
            </div>
            <div class="stat-card">
                <h3>Present Today</h3>
                <span id="presentToday">0</span>
            </div>
            <div class="stat-card">
                <h3>Pending Leaves</h3>
                <span id="pendingLeaves">0</span>
            </div>
        </div>

        <!-- Add Employee -->
        <div class="card">
            <h3>➕ Add Employee</h3>
            <form id="addEmployeeForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Name:</label>
                        <input type="text" id="empName" required>
                    </div>
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" id="empEmail" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Department:</label>
                        <input type="text" id="empDept" required>
                    </div>
                    <div class="form-group">
                        <label>Position:</label>
                        <input type="text" id="empPos" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Add Employee</button>
            </form>
        </div>

        <!-- Tabs for Admin -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showAdminTab('employees')">Employees</button>
            <button class="tab-btn" onclick="showAdminTab('todayAttendance')">Today's Attendance</button>
            <button class="tab-btn" onclick="showAdminTab('leaves')">Leave Requests</button>
        </div>

        <!-- Employees Tab -->
        <div id="employees" class="tab-content active">
            <table id="employeesTable">
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Email</th><th>Dept</th><th>Actions</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Attendance Tab -->
        <div id="todayAttendance" class="tab-content">
            <table id="attendanceTable">
                <thead>
                    <tr><th>Name</th><th>Email</th><th>Status</th><th>Time</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Leaves Tab -->
        <div id="leaves" class="tab-content">
            <table id="adminLeavesTable">
                <thead>
                    <tr><th>Employee</th><th>Type</th><th>Dates</th><th>Reason</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
