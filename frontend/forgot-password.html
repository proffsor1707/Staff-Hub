<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Employee Management System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .step-container { display: none; }
        .step-container.active { display: block; animation: fadeIn 0.3s ease; }
        .otp-input-group { display: flex; gap: 10px; align-items: center; }
        .otp-input-group input { flex: 1; }
        .timer-text { color: #667eea; font-size: 0.9rem; margin-top: 5px; }
        .resend-btn { background: none; border: none; color: #667eea; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .resend-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="bg-elements">
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
    </div>
    <div class="auth-container" style="max-width: 500px;">
        <div class="auth-header">
            <div class="logo"><i class="fas fa-key"></i> StaffHub</div>
            <h1 class="auth-title">Reset Password</h1>
            <p class="auth-subtitle">We'll send you an OTP to reset your password</p>
        </div>

        <!-- Step 1: Identify User -->
        <div id="step1" class="step-container active">
            <div class="form-group">
                <label>Email or Phone Number</label>
                <i class="fas fa-envelope input-icon"></i>
                <input type="text" id="resetContact" placeholder="Enter your registered email or phone" style="padding-left: 3rem;">
            </div>
            <button id="sendResetOtpBtn" class="submit-btn">Send OTP <i class="fas fa-paper-plane"></i></button>
        </div>

        <!-- Step 2: Verify OTP -->
        <div id="step2" class="step-container">
            <div class="form-group">
                <label>Enter OTP</label>
                <div class="otp-input-group">
                    <input type="text" id="resetOtp" placeholder="6-digit code" maxlength="6">
                    <button id="verifyResetOtpBtn" class="btn btn-primary">Verify</button>
                </div>
                <div class="timer-text" id="resetTimer"></div>
                <button id="resendResetOtpBtn" class="resend-btn" disabled>Resend OTP</button>
            </div>
        </div>

        <!-- Step 3: New Password -->
        <div id="step3" class="step-container">
            <div class="form-group">
                <label>New Password</label>
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="newPassword" placeholder="Enter new password" style="padding-left: 3rem;">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <i class="fas fa-check-circle input-icon"></i>
                <input type="password" id="confirmPassword" placeholder="Confirm new password" style="padding-left: 3rem;">
            </div>
            <button id="resetPasswordBtn" class="submit-btn">Update Password</button>
        </div>

        <div class="auth-links">
            <p><a href="login.html">← Back to Login</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
